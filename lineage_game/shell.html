<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
/*__STYLE__*/
</style>
</head>
<body>
  <div id="game-wrap">

    <!-- 화면 위쪽 : 캐릭터 상태 표시줄 -->
    <div id="statPanel">
      <div class="stat-row">
        <span id="statLevel">Lv.1</span>
        <div class="bar-outer">
          <div id="hpBar" class="bar-inner hp-bar"></div>
          <span id="hpText" class="bar-text">50 / 50</span>
        </div>
        <div class="bar-outer">
          <div id="expBar" class="bar-inner exp-bar"></div>
          <span id="expText" class="bar-text">0 / 10</span>
        </div>
        <span id="statGold">💰 0</span>
        <button id="invBtn" title="아이템 인벤토리를 열고 닫습니다">🎒 인벤토리</button>
        <button id="resetBtn" title="저장된 캐릭터를 지우고 새로 시작합니다">🔄 새로 시작</button>
      </div>
    </div>

    <!-- 게임 화면 (캔버스 = 그림을 그리는 도화지) -->
    <div id="canvasArea">
      <canvas id="gameCanvas" width="800" height="500"></canvas>

      <!-- 인벤토리 창 (평소엔 숨겨져 있다가 버튼 누르면 캔버스 위에 나타남) -->
      <div id="inventoryPanel" class="hidden">
        <div id="invHeader">
          <span>🎒 인벤토리</span>
          <button id="invCloseBtn">✕ 닫기</button>
        </div>
        <div id="equipSlots">
          <div class="equip-slot" id="equipWeapon">
            <span class="equip-icon">-</span>
            <span>무기</span>
          </div>
          <div class="equip-slot" id="equipArmor">
            <span class="equip-icon">-</span>
            <span>방어구</span>
          </div>
        </div>
        <div id="inventoryGrid"></div>
      </div>
    </div>

    <!-- 화면 아래쪽 : 전투 기록 로그 -->
    <div id="logBox"></div>

  </div>

  <script>
//__SCRIPT__//
  </script>
</body>
</html>
